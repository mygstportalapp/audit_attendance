         </div>
                
                <div class="sync-tracker"><div id="syncStatusText" style="font-size: 14px; font-weight: 800; color: #0f62fe;">🟢 Auto-Sync Active</div><div id="lastSyncTime" style="font-size: 12px; color: #888; margin-top: 6px;">Waiting for first sync...</div></div>
            </div>
        </div>

        <!-- BULK APPROVAL VIEW -->
        <div id="page-bulk-approval" class="page">
            <div class="card" style="padding: 15px;">
                <button class="btn btn-outline" style="padding: 8px 15px; margin-bottom: 15px; border:none; background:#eaedf1; color:#333; width: auto;" onclick="closeBulkView()">⬅ Back to Dashboard</button>
                <h3 id="bulkViewTitle" style="margin-bottom: 15px; font-size: 18px;"></h3>

                <!-- 🔥 DEFAULT TO DISPLAY NONE TO PREVENT FLASHING -->
                <div class="row" style="margin-bottom: 15px; display: none;" id="bulkActionButtons">
                    <button class="btn btn-primary" style="background: #24a148; font-size: 13px; padding: 10px;" onclick="submitBulkUpdate('Approved')">✔ Approve Selected</button>
                    <button class="btn btn-primary" style="background: #da1e28; font-size: 13px; padding: 10px;" onclick="submitBulkUpdate('Rejected')">✖ Reject Selected</button>
                </div>

                <div class="table-container" style="max-height: 50vh;">
                    <table id="bulkTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-masters" class="page">
            <div class="card">
                <h3>Users (Access Control)</h3>
                <div class="form-group"><input type="text" id="newUserName" placeholder="Full Name (e.g. Rahul)"></div>
                <div class="form-group"><input type="email" id="newUserEmail" placeholder="Authorized Gmail"></div>
                <div class="form-group"><select id="newUserRole"><option value="User">User</option><option value="Admin">Admin</option></select></div>
                <button class="btn btn-outline" onclick="addUser()">Add User</button>
            </div>
            <div class="card">
                <h3>Societies</h3>
                <div class="row" style="margin-bottom: 10px;"><input type="text" id="newSocName" placeholder="Full Name"><input type="text" id="newSocCode" placeholder="Code (e.g. AC)" style="width: 40%;"></div>
                <button class="btn btn-outline" onclick="addSociety()">Add Society</button>
            </div>
            <div class="card">
                <h3>Branches</h3>
                <div class="form-group"><select id="masterSocSelect"><option value="">Select Society</option></select></div>
                <div class="form-group"><input type="text" id="newBranch" placeholder="Branch Name"></div>
                <button class="btn btn-outline" onclick="addBranch()">Add Branch</button>
            </div>
             <div class="card">
                <h3>Works</h3>
                <div class="form-group"><input type="text" id="newWork" placeholder="Work Name"></div>
                <button class="btn btn-outline" onclick="addMaster('WorkMaster', 'newWork')">Add Work</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-attendance" onclick="switchPage('attendance', this)"><span class="nav-icon">📝</span>Entry</div>
            <div class="nav-item" id="nav-report" onclick="switchPage('report', this)"><span class="nav-icon">📊</span>Report</div>
            <div class="nav-item" id="nav-masters" onclick="switchPage('masters', this)" style="display:none;"><span class="nav-icon">⚙️</span>Masters</div>
        </div>
    </div>
    
    <div id="syncToast" class="toast">☁️ Cloud Synced</div>

    <script src="app.js"></script>
</body>
</html>
